# IBKR Watchdog Bot — Configuration

watchdog:
  check_interval_seconds: 60           # How often to check services are running
  startup_delay_ibc_to_risk: 20        # Seconds to wait after starting IBC before Risk Bot
  startup_delay_risk_to_entry: 20      # Seconds to wait after starting Risk Bot before Entry Bot
  restart_cooldown_seconds: 30         # Minimum seconds between restarts of same service
  initial_monitor_delay_seconds: 60    # Seconds to wait after startup before first monitor check
  show_windows: true                   # true = show CMD windows for bots | false = run in background

services:
  ibc:
    name: "IBC"
    launch_path: "C:\\SB-ITM\\IBC\\start_ibc.bat"
    process_match: "start_ibc"         # Fallback — not used when port_check is set
    port_check: 4002                   # Detect IBC via TCP port (more reliable than process name)
    enabled: true
    monitor: true
    show_window: false                 # IBC has its own GUI — no need for a CMD window

  risk_bot:
    name: "Risk Bot"
    launch_path: "C:\\SB-ITM\\RiskBot\\run.bat"
    process_match: " bot.py"           # Leading space ensures "entry_bot.py" won't match
    enabled: true
    monitor: true

  entry_bot:
    name: "Entry Bot"
    launch_path: "C:\\SB-ITM\\EntryBot\\run.bat"
    process_match: "entry_bot.py"
    enabled: true
    monitor: false                     # Launched at startup only — runs once per day and exits naturally

logging:
  level: "INFO"                        # DEBUG | INFO | WARNING | ERROR
  file: "watchdog.log"                 # Set to null to disable file logging
